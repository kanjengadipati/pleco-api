services:
  app:
    build: .
    container_name: placo-api
    restart: always
    env_file:
      - .env.docker
    depends_on:
      db:
        condition: service_healthy
      db-setup:
        condition: service_completed_successfully
      redis:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:8080/health >/dev/null 2>&1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  db:
    image: postgres:15-alpine
    container_name: postgres-db
    restart: always
    env_file:
      - .env.docker
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER"]
      interval: 5s
      timeout: 5s
      retries: 5

  db-setup:
    build:
      context: .
      dockerfile: docker/db-setup.Dockerfile
    container_name: db-setup
    working_dir: /app
    env_file:
      - .env.docker
    volumes:
      - .:/app
    depends_on:
      db:
        condition: service_healthy
    environment:
      ENV_FILE: .env.docker
      # Reduce peak memory usage during `go run ./cmd/seed` compilation
      GOMAXPROCS: "1"
      GOFLAGS: "-p=1"

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always

  gateway:
    image: nginx:alpine
    container_name: api-gateway
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      app:
        condition: service_healthy

volumes:
  db_data:
