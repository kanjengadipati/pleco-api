name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-release:
    name: Build release artifacts
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - goos: linux
            goarch: amd64
            archive: tar.gz
          - goos: linux
            goarch: arm64
            archive: tar.gz
          - goos: darwin
            goarch: amd64
            archive: tar.gz
          - goos: darwin
            goarch: arm64
            archive: tar.gz
          - goos: windows
            goarch: amd64
            archive: zip

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build binaries
        shell: bash
        run: |
          set -euo pipefail
          TAG_NAME="${GITHUB_REF_NAME}"
          ARTIFACT_NAME="pleco-${TAG_NAME}-${{ matrix.goos }}-${{ matrix.goarch }}"
          STAGE_DIR="dist/${ARTIFACT_NAME}"
          BIN_DIR="${STAGE_DIR}/bin"
          EXT=""
          if [ "${{ matrix.goos }}" = "windows" ]; then
            EXT=".exe"
          fi

          mkdir -p "${BIN_DIR}"

          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -trimpath -ldflags='-s -w' -o "${BIN_DIR}/api${EXT}" ./cmd/api
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -trimpath -ldflags='-s -w' -o "${BIN_DIR}/migrate${EXT}" ./cmd/migrate
          GOOS=${{ matrix.goos }} GOARCH=${{ matrix.goarch }} CGO_ENABLED=0 go build -trimpath -ldflags='-s -w' -o "${BIN_DIR}/seed${EXT}" ./cmd/seed

          cp README.md INSTALLATION.md TROUBLESHOOTING.md CHANGELOG.md LICENSE .env.example .env.docker.example .env.production.example "${STAGE_DIR}/"

          if [ "${{ matrix.archive }}" = "zip" ]; then
            (cd dist && zip -r "${ARTIFACT_NAME}.zip" "${ARTIFACT_NAME}")
          else
            tar -C dist -czf "dist/${ARTIFACT_NAME}.tar.gz" "${ARTIFACT_NAME}"
          fi

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.goos }}-${{ matrix.goarch }}
          path: |
            dist/*.tar.gz
            dist/*.zip

  publish-release:
    name: Publish GitHub release
    runs-on: ubuntu-latest
    needs: build-release

    steps:
      - name: Download release artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: release-*
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          sha256sum *.tar.gz *.zip > pleco-${GITHUB_REF_NAME}-checksums.txt

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/pleco-${{ github.ref_name }}-checksums.txt
